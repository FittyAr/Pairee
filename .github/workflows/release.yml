name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Extract changelog section for the tagged version
  release-notes:
    name: Extract Release Notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.extract.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: extract
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-}"
          if [[ -z "$VERSION" ]]; then
            echo "body=No release notes available." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          chmod +x scripts/extract_changelog.sh
          BODY=$(scripts/extract_changelog.sh "$VERSION" 2>/dev/null || echo "")

          if [[ -z "$BODY" ]]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare"
            BODY="See the [full changelog]($COMPARE_URL) for changes in this release."
          fi

          # GitHub Actions multiline output
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: release-notes
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.use-musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            curl -LSfs https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz | tar -xz -C /usr/local/bin
            cross build --release --target ${{ matrix.target }}
          else
            cargo clean
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package release assets
        shell: bash
        env:
          STORE_PACKAGE_NAME: ${{ secrets.STORE_PACKAGE_NAME || vars.STORE_PACKAGE_NAME || '30176FittyDev.Pairee' }}
          STORE_PUBLISHER: ${{ secrets.STORE_PUBLISHER || vars.STORE_PUBLISHER || 'CN=EDC5BDED-A726-42CD-B98E-5657B88D9832' }}
          STORE_PUBLISHER_DISPLAY_NAME: ${{ secrets.STORE_PUBLISHER_DISPLAY_NAME || vars.STORE_PUBLISHER_DISPLAY_NAME || 'FittyAr' }}
        run: |
          VERSION="${GITHUB_REF_NAME:-latest}"
          VERSION_NUM="${VERSION#v}"
          PKG_NAME="pairee-${VERSION}-${{ matrix.target }}"
          mkdir -p "$PKG_NAME"
          mkdir -p dist

          # Copy resources
          cp -r lang help README.md LICENSE "$PKG_NAME/"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/pairee.exe" "$PKG_NAME/"
            powershell -Command "Compress-Archive -Path '$PKG_NAME' -DestinationPath '${PKG_NAME}.zip' -Force"
            mv "${PKG_NAME}.zip" dist/

            # Compile Inno Setup installer
            if [ "${{ matrix.target }}" = "aarch64-pc-windows-msvc" ]; then
              MSYS_NO_PATHCONV=1 "C:\\Program Files (x86)\\Inno Setup 6\\iscc.exe" /DAppVersion="$VERSION_NUM" /DSourceDir="target\\aarch64-pc-windows-msvc\\release" /O"target\\release" /F"pairee-setup-${VERSION_NUM}-arm64" installer.iss
              mv "target/release/pairee-setup-${VERSION_NUM}-arm64.exe" dist/
            else
              MSYS_NO_PATHCONV=1 "C:\\Program Files (x86)\\Inno Setup 6\\iscc.exe" /DAppVersion="$VERSION_NUM" /DSourceDir="target\\x86_64-pc-windows-msvc\\release" /O"target\\release" /F"pairee-setup-${VERSION_NUM}-x64" installer.iss
              mv "target/release/pairee-setup-${VERSION_NUM}-x64.exe" dist/
            fi

            # Package MSIX for Windows Store / Sideloading
            MSIX_STAGING="target/msix_staging_${{ matrix.target }}"
            mkdir -p "$MSIX_STAGING"
            cp "target/${{ matrix.target }}/release/pairee.exe" "$MSIX_STAGING/"
            cp -r lang help manifests/msix/Assets "$MSIX_STAGING/"
            cp manifests/msix/AppxManifest.xml "$MSIX_STAGING/"

            ARCH="x64"
            if [ "${{ matrix.target }}" = "aarch64-pc-windows-msvc" ]; then
              ARCH="arm64"
            fi

            powershell -Command "
              \$content = Get-Content '$MSIX_STAGING/AppxManifest.xml';
              \$content = \$content -replace 'TEMPLATE_PACKAGE_IDENTITY_NAME', \$env:STORE_PACKAGE_NAME;
              \$content = \$content -replace 'TEMPLATE_PACKAGE_IDENTITY_PUBLISHER', \$env:STORE_PUBLISHER;
              \$content = \$content -replace 'TEMPLATE_PUBLISHER_DISPLAY_NAME', \$env:STORE_PUBLISHER_DISPLAY_NAME;
              \$content = \$content -replace 'Version=\"[0-9\.]+\"', '$VERSION_NUM.0';
              \$content = \$content -replace 'ProcessorArchitecture=\"[^\"]+\"', '$ARCH';
              Set-Content '$MSIX_STAGING/AppxManifest.xml' -Value \$content;
              \$makeappx = (Get-ChildItem -Path 'C:\Program Files (x86)\Windows Kits\10\bin' -Filter 'makeappx.exe' -Recurse | Where-Object { \$_.FullName -match 'x64' } | Select-Object -First 1).FullName;
              if (-not \$makeappx) { \$makeappx = 'makeappx.exe' };
              & \$makeappx pack /d '$MSIX_STAGING' /p 'dist/pairee-${VERSION_NUM}-${ARCH}.msix';
            "
          else
            cp "target/${{ matrix.target }}/release/pairee" "$PKG_NAME/"
            tar -czf "${PKG_NAME}.tar.gz" "$PKG_NAME"
            mv "${PKG_NAME}.tar.gz" dist/

            if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
              # Install cargo-deb and cargo-generate-rpm
              cargo install cargo-deb
              cargo install cargo-generate-rpm

              # Build DEB
              cargo deb --target x86_64-unknown-linux-musl --no-build
              mv target/x86_64-unknown-linux-musl/debian/*.deb dist/

              # Build RPM
              cargo generate-rpm --target x86_64-unknown-linux-musl
              mv target/x86_64-unknown-linux-musl/generate-rpm/*.rpm dist/
            fi
          fi

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd dist
          for f in *; do
            if [ -f "$f" ]; then
              sha256sum "$f" | awk '{print $1}' > "${f}.sha256"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          retention-days: 1

  # Create a DRAFT release — maintainer reviews and publishes manually
  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: [release-notes, build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
          body: ${{ needs.release-notes.outputs.body }}
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
