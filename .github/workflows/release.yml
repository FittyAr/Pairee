name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.use-musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            curl -LSfs https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz | tar -xz -C /usr/local/bin
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package release assets
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-latest}"
          VERSION_NUM="${VERSION#v}"
          PKG_NAME="pairee-${VERSION}-${{ matrix.target }}"
          mkdir -p "$PKG_NAME"
          mkdir -p dist
          
          # Copy resources
          cp -r lang help docs README.md LICENSE "$PKG_NAME/"
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/pairee.exe" "$PKG_NAME/"
            powershell -Command "Compress-Archive -Path '$PKG_NAME' -DestinationPath '${PKG_NAME}.zip' -Force"
            mv "${PKG_NAME}.zip" dist/
            
            # Compile Inno Setup installer
            if [ "${{ matrix.target }}" = "aarch64-pc-windows-msvc" ]; then
              MSYS_NO_PATHCONV=1 "C:\\Program Files (x86)\\Inno Setup 6\\iscc.exe" /DAppVersion="$VERSION_NUM" /DSourceDir="target\\aarch64-pc-windows-msvc\\release" /O"target\\release" /F"pairee-setup-${VERSION_NUM}-arm64" installer.iss
              mv "target/release/pairee-setup-${VERSION_NUM}-arm64.exe" dist/
            else
              MSYS_NO_PATHCONV=1 "C:\\Program Files (x86)\\Inno Setup 6\\iscc.exe" /DAppVersion="$VERSION_NUM" /DSourceDir="target\\x86_64-pc-windows-msvc\\release" /O"target\\release" /F"pairee-setup-${VERSION_NUM}-x64" installer.iss
              mv "target/release/pairee-setup-${VERSION_NUM}-x64.exe" dist/
            fi
          else
            cp "target/${{ matrix.target }}/release/pairee" "$PKG_NAME/"
            tar -czf "${PKG_NAME}.tar.gz" "$PKG_NAME"
            mv "${PKG_NAME}.tar.gz" dist/
            
            if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
              # Install cargo-deb and cargo-generate-rpm
              cargo install cargo-deb
              cargo install cargo-generate-rpm
              
              # Build DEB
              cargo deb --target x86_64-unknown-linux-musl --no-build
              mv target/x86_64-unknown-linux-musl/debian/*.deb dist/
              
              # Build RPM
              cargo generate-rpm --target x86_64-unknown-linux-musl
              mv target/x86_64-unknown-linux-musl/generate-rpm/*.rpm dist/
            fi
          fi

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
