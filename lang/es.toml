plugin_dev_desc_init = "Crea una nueva carpeta bajo el directorio de plugins del usuario con plantillas predefinidas:\n  - manifest.toml (Metadatos por defecto del autor/dependencias)\n  - main.lua (Punto de entrada de scripts y listeners de eventos)\n  - help/en.md (Plantillas de documentación del desarrollador)"
