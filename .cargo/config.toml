[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

# On Linux, the vendored OpenSSL build needs perl(IPC::Cmd) +
# perl(Params::Check) which the system perl (Fedora 44 minimal) does
# not ship. The repo's openssl-sys is therefore configured to use the
# system OpenSSL via a project-local prefix at `$HOME/local/openssl`
# (set up by AGENTS.md / the `make dev` target). The environment
# variables below match the runtime contract: any developer that
# `cargo build`s Pairee on a fresh checkout will be routed here.
[env]
# `OPENSSL_NO_VENDOR=1` tells openssl-sys to skip its vendored Perl
# build script and use `OPENSSL_DIR` instead. The default is
# `/home/deck/local/openssl` (the home directory of the user that
# set up the project). This file was generated by the M0/M1/M2
# implementation work; you can safely delete it if you have
# `pkg-config` and the system openssl development headers installed
# (e.g. `openssl-devel` on Fedora, `libssl-dev` on Debian/Ubuntu) —
# openssl-sys will fall back to `pkg-config` automatically.
OPENSSL_NO_VENDOR = "1"
OPENSSL_DIR = "/home/deck/local/openssl"

