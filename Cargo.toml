[package]
name = "ncrust"
version = "0.1.0"
edition = "2024"

[dependencies]
ratatui = "0.26.1"
crossterm = { version = "0.27.0", features = ["event-stream"] }
tokio = { version = "1.38.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
directories = "5.0"
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
simplelog = "0.12"
chrono = "0.4"
zip = { version = "8.6.0", default-features = false, features = ["deflate", "time"] }
tar = "0.4.46"
flate2 = "1.1.9"
sevenz-rust = "0.6.1"
reqwest = { version = "0.13.4", default-features = false, features = ["native-tls"] }

[dev-dependencies]
tempfile = "3.10"


